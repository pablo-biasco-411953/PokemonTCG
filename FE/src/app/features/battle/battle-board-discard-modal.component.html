<div class="discard-modal-overlay" *ngIf="visible" (click)="close.emit()">
  <div class="discard-modal-content" (click)="$event.stopPropagation()">
    <div class="dmc-header">
      <h3>{{ titulo }} ({{ cartas.length }})</h3>
      <button class="btn-close" (click)="close.emit()">✕</button>
    </div>

    <div class="dmc-grid custom-scrollbar">
      <div *ngFor="let carta of cartas" class="dmc-card-item">
        <img [src]="resolveImage(carta.id)" [alt]="carta.nombre" />
        <p>{{ carta.nombre }}</p>
      </div>
    </div>
  </div>
</div>
