<section class="action-picker" *ngIf="visible" aria-label="Acciones disponibles">
  <header class="action-picker__header">
    <div>
      <span class="action-picker__eyebrow">Tu Pokémon activo</span>
      <h3>Elegí una acción</h3>
    </div>
    <button class="action-picker__close" type="button" (click)="cerrar($event)" aria-label="Cerrar">×</button>
  </header>

  <div class="action-picker__list">
    <ng-container *ngIf="ataques.length; else sinAtaques">
      <button
        *ngFor="let ataque of ataques; let index = index"
        type="button"
        class="attack-option"
        [class.attack-option--locked]="!puedeUsarAtaque(ataque)"
        [disabled]="!puedeUsarAtaque(ataque)"
        (click)="seleccionarAtaque(ataque, $event)"
      >
        <span class="attack-option__index">0{{ index + 1 }}</span>

        <span class="attack-option__main">
          <span class="attack-option__title-row">
            <strong>{{ ataque.nombre }}</strong>
            <span class="attack-option__damage">
              <small>Daño</small>
              <b>{{ ataque.danio || ataque.dano || 0 }}</b>
            </span>
          </span>

          <span class="attack-option__cost-row">
            <span class="attack-option__cost-label">Coste</span>
            <span class="energy-cost">
              <span
                *ngFor="let check of getChecks(ataque)"
                class="energy-chip"
                [class.energy-chip--missing]="check.cumplido === false"
                [style.--energy-color]="resolveEnergyColor(check.tipo)"
                [title]="resolveEnergyName(check.tipo)"
              >
                <i></i>{{ resolveEnergyLabel(check.tipo) }}
              </span>
            </span>
          </span>

          <span class="attack-option__effect" *ngIf="ataque.texto">{{ ataque.texto }}</span>
          <span class="attack-option__status">
            {{ puedeUsarAtaque(ataque) ? 'LISTO PARA USAR' : 'FALTA ENERGÍA' }}
          </span>
        </span>
      </button>
    </ng-container>

    <ng-template #sinAtaques>
      <p class="empty-attacks">Este Pokémon no tiene ataques disponibles.</p>
    </ng-template>

    <button
      type="button"
      class="retreat-option"
      [class.retreat-option--locked]="retiroBloqueado"
      [disabled]="retiroBloqueado"
      (click)="seleccionarRetirada($event)"
    >
      <span class="retreat-option__icon">↩</span>
      <span>
        <small>Movimiento táctico</small>
        <strong>Retirar Pokémon</strong>
      </span>
      <span class="retreat-option__cost">
        <small>Coste</small>
        <b>{{ retiroCoste }}</b>
      </span>
    </button>
  </div>
</section>
