<!-- Contenedor de la escena 3D usada para abrir sobres. -->
<div class="fade-overlay"></div>
<div class="renderer-container" #rendererContainer (click)="onOverlayClick($event)">
    <div class="instrucciones">
        {{ mensajeGuia | t }}
    </div>

    <button
      *ngIf="puedePasar && !autoRevealEnCurso && !resumenVisible"
      type="button"
      class="skip-button"
      (click)="pasarRevelado(); $event.stopPropagation()">
      {{ 'pack.skip' | t }}
    </button>

    <div *ngIf="autoRevealEnCurso" class="auto-reveal-banner">
      {{ 'pack.revealing' | t }}
    </div>

    <div *ngIf="resumenVisible" class="summary-panel" (click)="$event.stopPropagation()">
      <div class="summary-header">
        <h2>{{ 'pack.cardsDiscovered' | t }}</h2>
        <p>{{ resumenCartas.length }} {{ 'pack.cardsObtained' | t }}</p>
      </div>

      <div class="summary-grid">
        <div *ngFor="let carta of resumenCartas" class="summary-card">
          <img [src]="getImagenCarta(carta.id)" [alt]="carta.nombre" (error)="onCardImageError($event)">
          <span>{{ carta.nombre }}</span>
        </div>
      </div>
      
      <div class="summary-footer">
        <button class="close-button secondary" (click)="finalizado.emit()">{{ 'pack.closeAndReturn' | t }}</button>
        <button class="close-button primary" [disabled]="sobresRestantes <= 0" (click)="abrirOtro.emit()">{{ 'pack.openAnother' | t }} ({{ 'pack.remaining' | t }}: {{ sobresRestantes }})</button>
      </div>
    </div>
</div>
