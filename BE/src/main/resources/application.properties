spring.application.name=backend
server.port=${PORT:8080}

# MySQL. Spring/JPA creates the schema and DataLoader seeds cards.json on startup.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/pokemon_tcg?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# SMTP para recuperar password. En Gmail hay que usar una App Password, no la clave normal.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:pokefetch.utn@gmail.com}
spring.mail.password=${MAIL_PASSWORD:odpeooqxglqnsbzm}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

app.mail.enabled=${MAIL_ENABLED:true}
app.mail.from=${MAIL_FROM:${spring.mail.username}}
app.mail.dev-token-response=${MAIL_DEV_TOKEN_RESPONSE:false}
app.frontend.reset-url=${FRONTEND_RESET_URL:http://localhost:4200/login}
