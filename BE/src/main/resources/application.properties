spring.application.name=backend
server.port=8080

# MySQL. Spring/JPA creates the schema and DataLoader seeds cards.json on startup.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/pokemon_tcg?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# SMTP para recuperar password. En Gmail hay que usar una App Password, no la clave normal.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:${MAIL_USERNAME:}}
app.mail.dev-token-response=${MAIL_DEV_TOKEN_RESPONSE:false}
app.frontend.reset-url=${FRONTEND_RESET_URL:http://localhost:4200/login}
